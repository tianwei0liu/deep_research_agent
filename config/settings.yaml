# Non-sensitive configuration for deep_research_agent.
# Override with env vars (e.g. DEEP_RESEARCH_AGENT_SUBAGENT_MODEL) if needed.
# API keys are never stored here; use .env for sensitive keys only.

# Deep Agent models (used by create_deep_agent supervisor + worker)
planner_model: "deepseek-chat"
planner_temperature: 0.0
worker_model: "deepseek-chat"
worker_temperature: 0.0

# Grader (LLM-as-Judge, uses Gemini SDK directly)
grader_model: "deepseek-chat"
grader_temperature: 0.0
grader_thinking_level: "medium"
grader_google_search_enabled: true

# Tavily Search
tavily_search_url: "https://api.tavily.com/search"
tavily_max_result_chars: 12000

# LangSmith / LangChain (tracing); SDK reads from environment — we set these from YAML at load time
langchain:
  tracing_v2: true
  project: "deep_research_agent"
langsmith_endpoint: "https://api.smith.langchain.com"

# Optional: DeepSeek base URL (when using DeepSeek client)
deepseek_base_url: "https://api.deepseek.com"

# Orchestrator & Worker Limits (Defaults)
default_max_parallel_workers: 10
default_recursion_limit: 25
default_worker_max_tool_calls: 40
default_worker_max_turns: 10
default_worker_max_output_tokens: 8192
